<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <title>AI Bookmarks Search (Small)</title>

  <!-- Background -->
  <rect width="200" height="200" rx="44" ry="44" fill="#111111"/>

  <!-- Bookmark ribbon: slightly wider for better legibility at small sizes,
       V-notch is shallower so it remains visible at 16px -->
  <path
    d="M74 36 L126 36 Q136 36 136 46 L136 164 L100 144 L64 164 L64 46 Q64 36 74 36 Z"
    fill="#ffffff"
  />

  <!-- Sparkle: slightly smaller (R=9) so it doesn't overpower at small sizes -->
  <path
    d="M100 65 L101.8 72.2 L109 74 L101.8 75.8 L100 83 L98.2 75.8 L91 74 L98.2 72.2 Z"
    fill="#111111"
  />
</svg>
